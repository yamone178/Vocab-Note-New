<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      color: #111827;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    label {
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
    }
    input, textarea, select {
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      padding: 8px 16px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:disabled {
      background-color: #93c5fd;
      cursor: not-allowed;
    }
    .status {
      font-size: 12px;
      margin-top: 4px;
    }
    .status.success { color: #059669; }
    .status.error { color: #dc2626; }
    
    #authContainer {
      display: none;
      text-align: center;
      padding: 20px 10px;
    }
    #authContainer p {
      margin-bottom: 15px;
      font-size: 14px;
      color: #4b5563;
    }
    #mainContainer.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="mainContainer" class="container">
    <h2>Quick Save Vocab</h2>
    <div class="field">
      <label for="word">Word</label>
      <input type="text" id="word" placeholder="Word to save">
    </div>
    <div class="field">
      <label for="definition">Definition (Optional)</label>
      <textarea id="definition" rows="2" placeholder="Brief definition"></textarea>
    </div>
    <div class="field">
      <label for="category">Category (Optional)</label>
      <select id="category">
        <option value="">Default (General)</option>
      </select>
    </div>
    <button id="saveBtn">Save to VocabNote</button>
    <div id="status" class="status"></div>
  </div>

  <div id="authContainer">
    <h2>Please Log In</h2>
    <p>You need to be logged into your VocabNote account to save words.</p>
    <div class="field">
      <label for="authEmail">Email</label>
      <input type="email" id="authEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="authPassword">Password</label>
      <input type="password" id="authPassword" placeholder="Your password">
    </div>
    <button id="loginBtn">Sign In</button>
    <div id="authStatus" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
